name: Build Fifteen Game

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GAME_NAME: fifteen-game

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxi-dev libgl1-mesa-dev mingw-w64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build Linux
        run: cargo build --release

      - name: Package .deb
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo deb --no-build

      - name: Package .rpm
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo generate-rpm

      - name: Build Windows
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Collect artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          cp target/release/$GAME_NAME dist/$GAME_NAME-$VERSION-linux-x86_64
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          cp target/x86_64-pc-windows-gnu/release/$GAME_NAME.exe dist/$GAME_NAME-$VERSION-windows-x86_64.exe

      - uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: fifteen-linux-windows
          path: dist/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x86_64
          - target: aarch64-apple-darwin
            suffix: macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Collect artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          cp target/${{ matrix.target }}/release/$GAME_NAME dist/$GAME_NAME-$VERSION-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: fifteen-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: fifteen-*
          merge-multiple: true
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*
