name: Build Fifteen Game

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GAME_NAME: fifteen-game

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxi-dev libgl1-mesa-dev mingw-w64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build Linux binary
        run: cargo build --release

      - name: Package .deb
        run: cargo deb --no-build

      - name: Package .rpm
        run: cargo generate-rpm

      - name: Cross-compile Windows
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cp target/release/$GAME_NAME dist/$GAME_NAME-$VERSION-linux-x86_64
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          cp target/x86_64-pc-windows-gnu/release/$GAME_NAME.exe dist/$GAME_NAME-$VERSION-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: fifteen-linux-windows
          path: dist/*

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            suffix: macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cp target/release/$GAME_NAME dist/$GAME_NAME-$VERSION-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: fifteen-${{ matrix.suffix }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: fifteen-*
          merge-multiple: true
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
